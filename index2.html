<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ClientFlow | Web Agency & CRM</title>

<style>

/* ================= BASE ================= */
html{
scroll-behavior:smooth;
}

body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
overflow-x:hidden;
}

/* ================= ANIMATED BACKGROUND ================= */
.bg{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-3;
background:
radial-gradient(circle at 20% 20%, rgba(0,255,136,0.85), transparent 40%),
radial-gradient(circle at 80% 30%, rgba(125,44,255,0.85), transparent 45%),
radial-gradient(circle at 50% 80%, rgba(0,200,255,0.75), transparent 50%);
filter: blur(60px);
animation: move 8s ease-in-out infinite alternate;
transform: scale(1.3);
}

@keyframes move{
0%{transform:translate(0,0) scale(1.3);}
100%{transform:translate(-70px,50px) scale(1.4);}
}

/* ================= SHINE ================= */
.shine{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
background:linear-gradient(120deg,transparent,rgba(255,255,255,0.04),transparent);
animation: shineMove 6s linear infinite;
}

@keyframes shineMove{
0%{transform:translateX(-100%);}
100%{transform:translateX(100%);}
}

/* ================= PARTICLES ================= */
.particles{
position:fixed;
width:100%;
height:100%;
top:0;
left:0;
z-index:-2;
overflow:hidden;
}

.particles span{
position:absolute;
width:3px;
height:3px;
background:#00ff88;
border-radius:50%;
box-shadow:0 0 10px #00ff88;
animation: float 10s linear infinite;
opacity:0.6;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* ================= HEADER ================= */
header{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px;
background:#000;
position:sticky;
top:0;
z-index:10;
border-bottom:1px solid #222;
}

.logo{
font-weight:bold;
color:#00ff88;
}

.btn{
background:#00ff88;
border:none;
padding:10px 15px;
border-radius:10px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.08);
}

/* ================= HERO ================= */
.hero{
text-align:center;
padding:90px 20px;
}

.hero h1{
font-size:45px;
color:#00ff88;
}

.hero p{
color:#bbb;
}

/* ================= SECTIONS ================= */
.section{
padding:60px 20px;
text-align:center;
}

h2{
color:#00ff88;
}

/* ================= GRID ================= */
.grid{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:15px;
}

.card,.plan{
width:240px;
background:#111;
padding:20px;
border-radius:12px;
border:1px solid #222;
}

/* ================= CONTACT BUTTONS ================= */
.contact{
margin-top:25px;
}

a.call,a.wa{
display:inline-block;
margin:10px;
padding:12px 18px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
}

a.call{
background:#00ff88;
color:black;
}

a.wa{
background:#25D366;
color:white;
}

/* ================= LOGIN ================= */
#login{
max-width:300px;
margin:80px auto;
background:#111;
padding:20px;
border-radius:10px;
border:1px solid #222;
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

/* ================= DASHBOARD ================= */
#app{
display:none;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #222;
padding:10px;
text-align:center;
}

th{
background:#00ff88;
color:black;
}

/* ================= FOOTER ================= */
footer{
text-align:center;
padding:20px;
color:#666;
}

</style>
</head>

<body>

<!-- BACKGROUND -->
<div class="bg"></div>

<div class="shine"></div>

<div class="particles">
<span style="left:10%"></span>
<span style="left:25%;animation-delay:2s"></span>
<span style="left:40%;animation-delay:1s"></span>
<span style="left:60%;animation-delay:3s"></span>
<span style="left:80%;animation-delay:2s"></span>
</div>

<!-- HEADER -->
<header>
<div class="logo">ClientFlow</div>
<button class="btn" onclick="document.getElementById('pricing').scrollIntoView({behavior:'smooth'})">
Pricing
</button>
</header>

<!-- HERO -->
<section class="hero">
<h1>We Build Websites That Bring Customers</h1>
<p>Modern SaaS + Agency system for real businesses</p>

<div class="contact">

<a class="call" href="tel:+918851544469">📞 Call Now</a>

<a class="wa" href="https://wa.me/918851544469?text=Hi%20I%20want%20a%20website">💬 WhatsApp</a>

</div>

</section>

<!-- SERVICES -->
<section class="section">
<h2>Services</h2>

<div class="grid">
<div class="card">Business Website</div>
<div class="card">Portfolio Website</div>
<div class="card">E-Commerce UI</div>
</div>

</section>

<!-- PRICING -->
<section class="section" id="pricing">
<h2>Pricing</h2>

<div class="grid">
<div class="plan"><h3>₹999</h3></div>
<div class="plan"><h3>₹2999</h3></div>
<div class="plan"><h3>₹5999</h3></div>
</div>

</section>

<!-- LOGIN -->
<div id="login">

<h2 style="color:#00ff88;text-align:center;">Admin Login</h2>

<input id="email" placeholder="Email">
<input id="pass" placeholder="Password">

<button class="btn" onclick="login()">Login</button>

</div>

<!-- DASHBOARD -->
<div id="app">

<section class="section">
<h2>CRM Dashboard</h2>

<table>
<tr><th>Name</th><th>Email</th><th>Message</th></tr>
<tbody id="data"></tbody>
</table>

</section>

</div>

<!-- FOOTER -->
<footer>
© 2026 ClientFlow | Built by Kartik Jha
</footer>

<script>

function login(){
let e=document.getElementById("email").value;
let p=document.getElementById("pass").value;

if(e && p){
document.getElementById("login").style.display="none";
document.getElementById("app").style.display="block";
load();
}
}

function load(){
let leads=[
{name:"Rahul",email:"rahul@gmail.com",msg:"Need website"},
{name:"Shop Owner",email:"shop@gmail.com",msg:"Business site"}
];

let box=document.getElementById("data");
box.innerHTML="";

leads.forEach(l=>{
box.innerHTML+=`
<tr>
<td>${l.name}</td>
<td>${l.email}</td>
<td>${l.msg}</td>
</tr>
`;
});
}

</script>

</body>
</html>
